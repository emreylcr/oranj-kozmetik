<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ürün Detayı - Oranj Kozmetik</title>
    <meta name="description" content="Oranj Kozmetik urun detay sayfasi. Sac boyasi ve kozmetik urunlerini inceleyin." />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="canonical" href="https://oranj-kozmetik.onrender.com/product.html" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="brand-lockup" aria-label="Oranj Kozmetik ana sayfa">
        <div class="brand-logo-wrap">
          <img src="logo.png" alt="" class="brand-logo" width="148" height="52" />
        </div>
        <span class="brand-divider" aria-hidden="true"></span>
        <div class="brand-copy">
          <h1 id="siteTitle" class="brand-title">Oranj Kozmetik</h1>
          <span class="brand-subtitle">Online Kozmetik Mağazası</span>
        </div>
      </a>
      <div class="header-right">
        <div class="quick-cart">
          <button id="quickCartBtn" class="btn outline">Sepet (<span id="quickCartCount">0</span>)</button>
          <div id="quickCartPanel" class="quick-cart-panel hidden"></div>
        </div>
        <a class="btn" href="index.html">Ana Sayfa</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <button class="btn outline" onclick="history.back()">← Geri</button>
        <div id="productDetail" class="product-detail-wrap"></div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="product.js"></script>
  </body>
</html>
