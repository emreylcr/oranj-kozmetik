services:
  - type: web
    name: oranj-kozmetik
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.17.0
      - key: NODE_ENV
        value: production
